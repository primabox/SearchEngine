version: '3.9'

services:
  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: serp-scraper
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      SERPER_API_KEY: ${SERPER_API_KEY}
    volumes:
      # Live-reload source files during local dev
      - ./src:/app/src:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/').then(r => process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
